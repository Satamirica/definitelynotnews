<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episodes – Definitely Not News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.archive-hero{background:var(--tv);padding:120px 0 56px;position:relative;overflow:hidden}
.archive-hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 50% 60% at 85% 50%,rgba(255,180,0,.08) 0%,transparent 60%)}
.archive-hero h1{font-family:var(--f-d);font-size:clamp(36px,6vw,64px);font-weight:900;color:var(--white);margin-bottom:14px}
.archive-hero p{font-size:17px;color:rgba(255,255,255,.5);max-width:520px;line-height:1.65}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:40px 0 48px}
.ftab{font-family:var(--f-d);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:9px 18px;border-radius:20px;border:1px solid var(--border);color:var(--muted);transition:all .2s;cursor:pointer;background:var(--white)}
.ftab:hover{border-color:var(--ink);color:var(--ink)}
.ftab.active{background:var(--tv);color:var(--white);border-color:var(--tv)}
.theme-block{margin-bottom:56px}
.theme-block-head{display:flex;align-items:center;gap:16px;padding-bottom:16px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.theme-icon{width:44px;height:44px;border-radius:10px;background:var(--tv);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.theme-block-label{font-family:var(--f-d);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.theme-block-title{font-family:var(--f-d);font-size:20px;font-weight:800}
.theme-fairy{font-size:13px;color:var(--gold);font-family:var(--f-d);font-weight:600;margin-top:2px}
.theme-block-link{font-family:var(--f-d);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tv);border-bottom:1.5px solid rgba(34,35,35,.25);padding-bottom:2px;white-space:nowrap;flex-shrink:0}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.block-sep{background:var(--tv);border-radius:14px;padding:28px 32px;margin:64px 0 40px;display:flex;align-items:center;gap:20px}
.block-sep-icon{font-size:32px}
.block-sep-label{font-family:var(--f-d);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.block-sep-title{font-family:var(--f-d);font-size:20px;font-weight:800;color:var(--white);line-height:1.2}
.block-sep-desc{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px}
</style>
</head>
<body>
<div id="nav-ph"></div>
<div class="archive-hero">
  <div class="archive-hero-bg"></div>
  <div class="container" style="position:relative;z-index:1;">
    <span class="eyebrow gold">Archive</span>
    <h1>All episodes</h1>
    <p>Episodes are grouped by theme. Each theme – one fairy tale, one event, two perspectives. Watch both episodes in each pair.</p>
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="filter-row">
      <button class="ftab active" onclick="filterBlock('all',this)">All episodes (28)</button>
      <button class="ftab" onclick="filterBlock('manip',this)">Block 1 · Manipulation (20)</button>
      <button class="ftab" onclick="filterBlock('fake',this)">Block 2 · Fake news (8)</button>
      <button class="ftab" onclick="filterBlock('tv',this)">The Royal Herald</button>
      <button class="ftab" onclick="filterBlock('gl',this)">The First Crier</button>
    </div>
    <div id="archiveContent"></div>
  </div>
</section>
<div id="footer-ph"></div>
<script src="shared.js"></script>
<script>
document.getElementById('nav-ph').innerHTML = renderNav('Episodes');
document.getElementById('footer-ph').innerHTML = renderFooter();
const MANIP_THEMES=[
  {key:'agenda',    icon:'📋',label:'Block 1 · Manipulation · Theme 1',title:'Agenda Setting',            fairy:'📖 Little Red Riding Hood',url:'theory-agenda.html'},
  {key:'framing',   icon:'🖼️',label:'Block 1 · Manipulation · Theme 2',title:'Framing',                   fairy:'📖 Cinderella',            url:'theory-framing.html'},
  {key:'narrative', icon:'🦸',label:'Block 1 · Manipulation · Theme 3',title:'Narrative: hero & villain',  fairy:'📖 Three Little Pigs',     url:'theory-narrative.html'},
  {key:'emotion',   icon:'❤️',label:'Block 1 · Manipulation · Theme 4',title:'Emotional Impact',           fairy:'📖 Father Frost',          url:'theory-emotion.html'},
  {key:'source',    icon:'🎙️',label:'Block 1 · Manipulation · Theme 5',title:'Source and Authority',      fairy:'📖 Ivan Tsarevich',        url:'theory-source.html'},
];
const FAKE_THEMES=[
  {key:'whatfake',icon:'🎭',label:'Block 2 · Fake news · Series 1',title:'What is fake news and how it lives',fairy:'📖 The Round Bun',url:''},
  {key:'sindbad', icon:'🌊',label:'Block 2 · Fake news · Series 2',title:'The unverifiable threat',            fairy:'📖 Sinbad',       url:''},
];
function renderThemeBlock(t,eps){
  if(!eps.length)return'';
  return`<div class="theme-block"><div class="theme-block-head"><div class="theme-icon">${t.icon}</div><div style="flex:1"><div class="theme-block-label">${t.label}</div><div class="theme-block-title">${t.title}</div><div class="theme-fairy">${t.fairy}</div></div>${t.url?`<a href="${t.url}" class="theme-block-link">Read theory →</a>`:''}</div><div class="ep-grid">${eps.map(renderEpCard).join('')}</div></div>`;
}
function renderArchive(filter){
  let html='';
  const showManip=filter==='all'||filter==='manip'||filter==='tv'||filter==='gl';
  const showFake=filter==='all'||filter==='fake'||filter==='tv'||filter==='gl';
  if(showManip){
    html+=`<div class="block-sep"><div class="block-sep-icon">🎭</div><div><div class="block-sep-label">Block 1 · 20 episodes</div><div class="block-sep-title">Media manipulation</div><div class="block-sep-desc">How one event becomes different stories</div></div></div>`;
    MANIP_THEMES.forEach(t=>{let eps=EPISODES.filter(e=>e.theme===t.key);if(filter==='tv'||filter==='gl')eps=eps.filter(e=>e.ch===filter);html+=renderThemeBlock(t,eps);});
  }
  if(showFake){
    html+=`<div class="block-sep"><div class="block-sep-icon">🔍</div><div><div class="block-sep-label">Block 2 · 8 episodes</div><div class="block-sep-title">Fake news</div><div class="block-sep-desc">Two mini-series on how fakes are made and spread</div></div></div>`;
    FAKE_THEMES.forEach(t=>{let eps=EPISODES.filter(e=>e.theme===t.key);if(filter==='tv'||filter==='gl')eps=eps.filter(e=>e.ch===filter);html+=renderThemeBlock(t,eps);});
  }
  document.getElementById('archiveContent').innerHTML=html||'<p style="color:var(--muted);padding:40px 0;">No episodes found.</p>';
}
function filterBlock(f,btn){document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderArchive(f);}
renderArchive('all');
</script>
</body>
</html>
