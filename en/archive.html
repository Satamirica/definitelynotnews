<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episodes — Точно не новости</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  --tv:       #0B0F2E;
  --tv-mid:   #1A2257;
  --gold:     #C9A84C;
  --gold-lt:  #F0D080;
  --gl:       #0D0D0D;
  --gl-mid:   #1E1E1E;
  --cyan:     #00D4CC;
  --cyan-lt:  #7FF0EB;
  --red:      #C0392B;
  --cream:    #F5F3EE;
  --white:    #FFFFFF;
  --ink:      #1A1A1A;
  --muted:    #6B6B6B;
  --border:   #E0DDD6;
  --ease:     cubic-bezier(.4,0,.2,1);
  --f-d:      'Manrope', sans-serif;
  --f-b:      'Golos Text', sans-serif;
}

/* ── RESET ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--f-b);
  background: var(--cream);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { max-width: 100%; display: block; }

/* ── NAV ─────────────────────────────────────────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: rgba(11,15,46,.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,.18);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 64px; gap: 24px;
}
.nav-logo {
  font-family: var(--f-d); font-size: 15px; font-weight: 900;
  letter-spacing: .04em; color: var(--white); white-space: nowrap;
  flex-shrink: 0;
}
.nav-logo .ne { color: var(--red); }
.nav-links {
  display: flex; align-items: center; gap: 4px; list-style: none;
  flex-wrap: nowrap;
}
.nav-links a {
  font-family: var(--f-d); font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.55); padding: 6px 10px; border-radius: 6px;
  transition: color .2s, background .2s; white-space: nowrap;
}
.nav-links a:hover,
.nav-links a.active { color: var(--white); background: rgba(255,255,255,.08); }
.nav-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.lang-sw { display: flex; gap: 2px; }
.lang-btn {
  font-family: var(--f-d); font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.35); padding: 4px 8px; border-radius: 4px;
  transition: color .2s, background .2s;
}
.lang-btn.active, .lang-btn:hover { color: var(--gold); background: rgba(201,168,76,.12); }

/* ── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--f-d); font-size: 13px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 14px 28px; border-radius: 8px;
  transition: transform .2s var(--ease), box-shadow .2s var(--ease);
}
.btn:hover { transform: translateY(-2px); }
.btn-gold { background: var(--gold); color: var(--tv); box-shadow: 0 4px 24px rgba(201,168,76,.28); }
.btn-gold:hover { box-shadow: 0 8px 32px rgba(201,168,76,.45); }
.btn-ghost { background: rgba(255,255,255,.08); color: var(--white); border: 1px solid rgba(255,255,255,.18); }
.btn-ghost:hover { background: rgba(255,255,255,.14); }
.btn-dark { background: var(--tv); color: var(--white); }
.btn-cyan { background: var(--cyan); color: var(--gl); }

/* ── TYPOGRAPHY UTILS ────────────────────────────────────────────────────── */
.eyebrow {
  font-family: var(--f-d); font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px; display: block;
}
.eyebrow.light { color: rgba(255,255,255,.4); }
.eyebrow.gold  { color: var(--gold); }
.eyebrow.cyan  { color: var(--cyan); }

.display {
  font-family: var(--f-d); font-weight: 800; line-height: 1.12;
  font-size: clamp(32px, 5vw, 56px);
}
.display.light { color: var(--white); }

.lead {
  font-size: 18px; line-height: 1.75; color: #3A3A3A; max-width: 680px;
}
.lead.light { color: rgba(255,255,255,.6); }
.lead p + p { margin-top: 14px; }

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
.container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
.section { padding: 88px 0; }
.section-sm { padding: 56px 0; }

/* ── CARDS ───────────────────────────────────────────────────────────────── */
.card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: transform .2s var(--ease), box-shadow .2s var(--ease);
}
.card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.09); }

/* ── CHANNEL BADGE ───────────────────────────────────────────────────────── */
.ch-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--f-d); font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px;
}
.ch-badge.tv { background: rgba(11,15,46,.1); color: var(--tv); }
.ch-badge.gl { background: rgba(0,212,204,.12); color: #006660; }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; }
.ch-dot.tv { background: var(--gold); }
.ch-dot.gl { background: var(--cyan); }

/* ── EPISODE CARD ────────────────────────────────────────────────────────── */
.ep-card .ep-head {
  padding: 10px 16px; display: flex; align-items: center; gap: 8px;
}
.ep-card .ep-head.tv { background: var(--tv); }
.ep-card .ep-head.gl { background: var(--gl); }
.ep-card .ep-ch {
  font-family: var(--f-d); font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
}
.ep-card .ep-ch.tv { color: var(--gold); }
.ep-card .ep-ch.gl { color: var(--cyan); }
.ep-card .ep-num { font-size: 10px; color: rgba(255,255,255,.3); margin-left: auto; font-family: var(--f-d); }
.ep-card .ep-body { padding: 16px; }
.ep-card .ep-title {
  font-family: var(--f-d); font-size: 14px; font-weight: 700;
  line-height: 1.3; margin-bottom: 6px;
}
.ep-card .ep-desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
.ep-card .ep-dur { font-size: 11px; color: var(--muted); font-family: var(--f-d); font-weight: 600; }

/* ── DIVIDER ─────────────────────────────────────────────────────────────── */
hr.divider { border: none; border-top: 1px solid var(--border); }

/* ── FOOTER ──────────────────────────────────────────────────────────────── */
.footer {
  background: var(--tv);
  border-top: 1px solid rgba(255,255,255,.06);
  padding: 48px 40px;
}
.footer-inner {
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 48px;
}
.footer-logo {
  font-family: var(--f-d); font-size: 18px; font-weight: 900;
  color: var(--white); margin-bottom: 10px;
}
.footer-logo .ne { color: var(--red); }
.footer-tagline { font-size: 13px; color: rgba(255,255,255,.35); line-height: 1.6; }
.footer-col h4 {
  font-family: var(--f-d); font-size: 11px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  color: rgba(255,255,255,.35); margin-bottom: 14px;
}
.footer-col a {
  display: block; font-size: 13px; color: rgba(255,255,255,.55);
  margin-bottom: 8px; transition: color .2s;
}
.footer-col a:hover { color: var(--white); }
.footer-bottom {
  max-width: 1100px; margin: 32px auto 0;
  padding-top: 24px; border-top: 1px solid rgba(255,255,255,.06);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.footer-copy { font-size: 12px; color: rgba(255,255,255,.25); }

/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .nav-links { display: none; }
  .nav { padding: 0 20px; }
  .container { padding: 0 20px; }
  .section { padding: 64px 0; }
  .footer-inner { grid-template-columns: 1fr; gap: 32px; }
  .footer { padding: 40px 20px; }
}

/* ── BACK BUTTON ─────────────────────────────────────────────────────────── */
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--f-d); font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.5); padding: 8px 16px;
  border: 1px solid rgba(255,255,255,.15); border-radius: 20px;
  background: rgba(255,255,255,.06);
  transition: all .2s var(--ease);
  margin-bottom: 28px; text-decoration: none; cursor: pointer;
}
.back-btn:hover {
  color: var(--gold); border-color: rgba(201,168,76,.4);
  background: rgba(201,168,76,.08);
}

</style>
<style>
.archive-hero {
  background: var(--tv); padding: 120px 0 56px;
  position: relative; overflow: hidden;
}
.archive-hero-bg {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 50% 60% at 85% 50%, rgba(201,168,76,.08) 0%, transparent 60%);
}
.archive-hero h1 {
  font-family: var(--f-d); font-size: clamp(36px,6vw,64px);
  font-weight: 900; color: var(--white); margin-bottom: 14px;
}
.archive-hero p { font-size: 17px; color: rgba(255,255,255,.5); max-width: 520px; line-height: 1.65; }

/* Filter bar */
.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin: 40px 0 48px;
}
.ftab {
  font-family: var(--f-d); font-size: 12px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 9px 18px; border-radius: 20px;
  border: 1px solid var(--border); color: var(--muted);
  transition: all .2s; cursor: pointer; background: var(--white);
}
.ftab:hover { border-color: var(--ink); color: var(--ink); }
.ftab.active { background: var(--tv); color: var(--white); border-color: var(--tv); }

/* Theme block */
.theme-block { margin-bottom: 56px; }
.theme-block-head {
  display: flex; align-items: center; gap: 16px;
  padding-bottom: 16px; margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
}
.theme-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--tv); display: flex; align-items: center;
  justify-content: center; font-size: 22px; flex-shrink: 0;
}
.theme-meta { flex: 1; }
.theme-block-label {
  font-family: var(--f-d); font-size: 10px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.theme-block-title {
  font-family: var(--f-d); font-size: 20px; font-weight: 800;
}
.theme-fairy {
  font-size: 13px; color: var(--gold);
  font-family: var(--f-d); font-weight: 600; margin-top: 2px;
}
.theme-block-link {
  font-family: var(--f-d); font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--tv); border-bottom: 1.5px solid rgba(11,15,46,.25);
  padding-bottom: 2px; white-space: nowrap;
  flex-shrink: 0;
}
.theme-block-link:hover { border-color: var(--tv); }

/* Episode grid */
.ep-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap: 14px;
}

/* Block separator */
.block-sep {
  background: var(--tv); border-radius: 14px; padding: 28px 32px;
  margin: 64px 0 40px; display: flex; align-items: center; gap: 20px;
}
.block-sep-icon { font-size: 32px; }
.block-sep-label {
  font-family: var(--f-d); font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 6px;
}
.block-sep-title {
  font-family: var(--f-d); font-size: 20px; font-weight: 800;
  color: var(--white); line-height: 1.2;
}
.block-sep-desc { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px; }

@media (max-width: 700px) {
  .theme-block-link { display: none; }
}
</style>
</head>
<body>

<div id="nav-ph"></div>

<div class="archive-hero">
  <div class="archive-hero-bg"></div>
  <div class="container" style="position:relative;z-index:1;">
    <span class="eyebrow gold">Archive</span>
    <h1>All episodes</h1>
    <p>Episodes сгруппированы по темам. Каждая тема — одна сказка, одно событие, два взгляда. Смотрите оба выпуска подряд.</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <div class="filter-row">

      <button class="ftab" onclick="filterBlock('tv', this)">The Royal Herald</button>
      <button class="ftab" onclick="filterBlock('gl', this)">The First Crier</button>
    </div>

    <div id="archiveContent"></div>

  </div>
</section>

<div id="footer-ph"></div>

/* Language switcher */
function switchLang(lang) {
  const cur = (window.location.pathname.split('/').pop() || 'index.html').replace(/^$/, 'index.html');
  const path = window.location.pathname;
  const inEn = path.indexOf('/en/') > -1;
  const inKz = path.indexOf('/kz/') > -1;

  if (lang === 'ru') {
    if (inEn || inKz) window.location.href = '../../' + cur;
    return;
  }
  if (lang === 'en') {
    if (inKz) window.location.href = '../en/' + cur;
    else if (!inEn) window.location.href = 'en/' + cur;
    return;
  }
  if (lang === 'kz') {
    if (inEn) window.location.href = '../kz/' + cur;
    else if (!inKz) window.location.href = 'kz/' + cur;
    return;
  }
}
